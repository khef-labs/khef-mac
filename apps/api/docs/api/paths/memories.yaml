      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/UpdateCommentInput
    responses:
      '200':
        description: Comment updated
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  $ref: ../components/schemas.yaml#/Comment
      '400':
        description: Invalid input (empty update body, invalid status)
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Comment not found (or belongs to different memory)
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
  delete:
    operationId: deleteMemoryComment
    tags:
      - comments
    summary: Delete a comment
    description: Permanently delete a comment from a memory.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - $ref: ../components/parameters.yaml#/CommentId
    responses:
      '204':
