        application/json:
          schema:
            type: object
            required:
              - value
            properties:
              value:
                type: string
                description: The value to set
                example: light
    responses:
      '200':
        description: Metadata value set
        content:
          application/json:
            schema:
              type: object
              properties:
                field:
                  type: string
                value:
                  type: string
                value_type:
                  type: string
      '400':
        description: Invalid memoryId or missing value
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or metadata field not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
  delete:
    operationId: deleteMemoryMetadata
    tags:
      - metadata
    summary: Remove a metadata value
    description: Delete a metadata value from a memory.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: field
        in: path
        required: true
        description: The metadata field name to remove
        schema:
          type: string
    responses:
      '204':
        description: Metadata value removed (or didn't exist)
      '400':
        description: Invalid memoryId
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or metadata field definition not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
