          Export-related fields include:
          - export-image-theme
          - export-diagram-scale (legacy Kroki PNG scale, 1–4)
          - export-png-render-scale (Playwright SVG→PNG render scale, 1–4)
          - export-png-display-scale-percent (DOCX display size percent, 10–300)
        schema:
          type: string
    requestBody:
      required: true
