          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdMetadataById:
  put:
    operationId: replaceMemoryMetadata
    tags:
      - metadata
    summary: Set a metadata value
    description: |
      Set or update a metadata value for a memory. The field must be a defined
      metadata field for the 'memory' entity type. Creates the value if it doesn't
      exist, updates if it does.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: field
