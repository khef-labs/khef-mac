      '404':
        description: Comment not found (or belongs to different memory)
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdSnapshots:
  get:
    operationId: listMemorySnapshots
    tags:
      - snapshots
    summary: List memory snapshots
    description: |
      List all content snapshots for a memory. Snapshots are immutable captures
      of memory content created manually via save button or automatically during
      external sync. Each snapshot includes preserved comments from that point in time.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
    responses:
      '200':
        description: List of snapshots
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_id:
                  type: string
                  format: uuid
                current_snapshot:
                  type: integer
                  description: The currently active snapshot number
                snapshots:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/SnapshotListItem
                total:
                  type: integer
      '400':
        description: Invalid memoryId (not a UUID)
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdSnapshotsById:
  get:
    operationId: getMemorySnapshot
    tags:
      - snapshots
    summary: Get snapshot content
    description: |
      Retrieve the content and comments of a specific snapshot. For the current
      snapshot, returns live content and comments. For historical snapshots,
      returns the preserved content and comments from when the snapshot was created.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: snapshotNumber
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        description: Snapshot number (1-based)
    responses:
      '200':
        description: Snapshot content
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/SnapshotDetail
      '400':
        description: Invalid memoryId or snapshotNumber
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or snapshot not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
  delete:
    operationId: deleteMemorySnapshot
    tags:
      - snapshots
    summary: Delete a snapshot
    description: |
      Delete a snapshot from history. If deleting the current snapshot,
      content is restored from the previous snapshot. Cannot delete the
      only remaining snapshot.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: snapshotNumber
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        description: Snapshot number (1-based)
    responses:
      '200':
        description: Snapshot deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                deleted_snapshot:
                  type: integer
                current_snapshot:
                  type: integer
                  description: Current snapshot number (after deletion)
                new_current_snapshot:
                  type: integer
                  description: New current snapshot (if current was deleted)
                message:
                  type: string
      '400':
        description: Cannot delete the only snapshot
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or snapshot not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdSnapshotsByIdRestore:
  post:
    operationId: restoreMemorySnapshot
    tags:
      - snapshots
    summary: Restore a historical snapshot as current
    description: |
      Restore a historical snapshot's content as the current memory content.
      Creates a safety snapshot of the current state (source: pre-restore) before
      restoring. Comments are left untouched. Chunks are regenerated from the
      restored content. Snapshot numbering moves forward (never rewinds).
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: snapshotNumber
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: Snapshot restored successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                restored_from_snapshot:
                  type: integer
                  description: The snapshot number that was restored
                safety_snapshot:
                  type: integer
                  description: Snapshot number where previous state was saved
                new_current_snapshot:
                  type: integer
                  description: New current snapshot number
                message:
                  type: string
      '400':
        description: Snapshot is already current or invalid
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or snapshot not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdSnapshotsDiff:
  get:
    operationId: diffMemorySnapshots
    tags:
      - snapshots
    summary: Compare two memory snapshots
    description: |
      Returns a structured line-level diff between any two snapshots.
      Use snapshot numbers or "current" to reference the live content.
    parameters:
      - $ref: ../components/parameters.yaml#/MemoryId
      - name: from
        in: query
        required: true
        schema:
          type: string
        description: Source snapshot number or "current"
      - name: to
        in: query
        required: true
        schema:
          type: string
        description: Target snapshot number or "current"
      - name: context
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 3
        description: |
          Number of unchanged lines to show around each change (like git diff -U).
          Defaults to 3. Large unchanged sections are replaced with skip markers
          showing the number of omitted lines.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 20
        description: |
          Max number of change chunks to return. Default 20.
          Set to 0 to return all changes (full diff).
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Number of change chunks to skip. Use with limit for pagination.
    responses:
      '200':
        description: Structured diff between the two snapshots with pagination
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/SnapshotDiffResponse
      '400':
        description: Invalid or missing parameters
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
      '404':
        description: Memory or snapshot not found
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Error
MemoriesByIdMetadata:
