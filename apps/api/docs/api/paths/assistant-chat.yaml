    operationId: deleteChatById
    tags:
      - assistant-chat
    summary: Delete chat by UUID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Chat deleted
      '404':
        $ref: ../components/responses.yaml#/NotFound

ChatsAll:
