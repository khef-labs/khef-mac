# Handle-less chat routes (cross-backend)

ChatsList:
  get:
    operationId: listAllChats
    tags:
      - assistant-chat
    summary: List all chats
    description: List all chats across backends (excludes delegated child chats)
    parameters:
      - name: project_id
        in: query
        description: Filter by project (handle, name, or UUID)
        schema:
          type: string
      - name: source
        in: query
        description: Filter by origin channel
        schema:
          type: string
          enum: [ui, mcp, api]
      - name: assistant_handle
        in: query
        description: Filter by assistant backend
        schema:
          type: string
          enum: [claude-code, codex-cli, gemini]
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
    responses:
      '200':
        description: List of chats
        content:
          application/json:
            schema:
              type: object
              properties:
                chats:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/AssistantChatSummary
                pagination:
                  $ref: ../components/schemas.yaml#/PaginationMetadata

      '400':
        $ref: ../components/responses.yaml#/BadRequest
ChatsById:
  get:
    operationId: getChatById
    tags:
      - assistant-chat
    summary: Get chat by UUID
    description: Get a chat by UUID without specifying assistant handle
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: include_messages
        in: query
        schema:
          type: string
          enum: ['true', 'false']
    responses:
      '200':
        description: Chat found
        content:
          application/json:
            schema:
              type: object
              properties:
                chat:
                  $ref: ../components/schemas.yaml#/AssistantChat
      '404':
        $ref: ../components/responses.yaml#/NotFound
  patch:
    operationId: updateChatById
    tags:
      - assistant-chat
    summary: Update chat title
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                maxLength: 200
    responses:
      '200':
        description: Chat updated
        content:
          application/json:
            schema:
              type: object
              properties:
                chat:
                  $ref: ../components/schemas.yaml#/AssistantChat
      '404':
        $ref: ../components/responses.yaml#/NotFound
