# ── Job Definitions ──────────────────────────────────────────────
JobDefinitionSummary:
  type: object
  description: Pipeline definition summary with step and job counts
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      description: Unique kebab-case identifier
    name:
      type: string
    description:
      type: string
      nullable: true
    is_system:
      type: boolean
      description: System definitions cannot be deleted
    step_count:
      type: integer
    job_count:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - key
    - name
    - is_system
    - step_count
    - job_count
    - created_at
    - updated_at

JobDefinitionStep:
  type: object
  description: A single step in a pipeline definition
  properties:
    id:
      type: string
      format: uuid
    step_index:
      type: integer
      description: Execution order (0-based)
    key:
      type: string
      description: Identifier for input wiring references
    name:
      type: string
    step_type:
      type: string
      enum: [prompt, map_reduce, code]
    assistant_handle:
      type: string
      nullable: true
      description: Agent override (null inherits from job)
    model:
      type: string
      nullable: true
      description: Model for this step (e.g., claude-opus-4-7, gemini-2.5-pro). Null falls back to run-level model or backend default.
    prompt_handle:
      type: string
      nullable: true
      description: Reference to prompts table
    input_source:
      type: string
      enum: [job_input, previous_step, template]
    input_config:
      type: object
      description: Source-specific parameters (e.g., input_type, step_key, template)
    config:
      type: object
      description: "Step-type-specific config. map_reduce: chunk_size, threshold, batch_prompt_handle, skip_synthesis, batch_timeout_ms (per-batch timeout override, falls back to step timeout_ms), synthesis_timeout_ms (synthesis-only timeout override, falls back to step timeout_ms). code: script_path (.ts/.tsx via tsx, .py via python3, others via node). Gemini steps: use_google_search, use_thinking (boolean), thinking_budget (number)"
    timeout_ms:
      type: integer
      description: Step timeout in milliseconds. For map_reduce, applied per LLM call (each batch and synthesis independently) unless overridden by config.batch_timeout_ms / config.synthesis_timeout_ms.
  required:
    - step_index
    - key
    - name
    - step_type
    - input_source
    - timeout_ms

JobDefinitionInput:
  type: object
  description: Declared input requirement for a definition
  properties:
    id:
      type: string
      format: uuid
    input_type:
      type: string
      description: Input type key (e.g., prompt, transcript, chunk_prompt)
    format:
      type: string
      nullable: true
      description: Content format hint from the input type (e.g., text, json, csv)
    required:
      type: boolean
    description:
      type: string
      nullable: true
    example:
      type: string
      nullable: true
      description: Example content showing what a well-formed input looks like
  required:
    - input_type
    - required

JobDefinitionDetail:
  type: object
  description: Full definition with steps and input declarations
  properties:
    definition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - key
        - name
        - is_system
        - created_at
        - updated_at
    steps:
      type: array
      items:
        $ref: '#/JobDefinitionStep'
    inputs:
      type: array
      items:
        $ref: '#/JobDefinitionInput'
  required:
    - definition
    - steps
    - inputs

CreateJobDefinitionBody:
  type: object
  properties:
    key:
      type: string
      description: Unique lowercase kebab-case identifier
      pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    name:
      type: string
    description:
      type: string
    steps:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          key:
            type: string
          name:
            type: string
          step_type:
            type: string
            enum: [prompt, map_reduce, code]
            default: prompt
          assistant_handle:
            type: string
            nullable: true
          model:
            type: string
            nullable: true
            description: Model for this step (e.g., claude-opus-4-7, gemini-2.5-pro)
          prompt_handle:
            type: string
            nullable: true
          input_source:
            type: string
            enum: [job_input, previous_step, template]
            default: job_input
          input_config:
            type: object
          config:
            type: object
            description: "Step-type-specific config. map_reduce: chunk_size, threshold, batch_prompt_handle, skip_synthesis. code: script_path (.ts/.tsx via tsx, .py via python3, others via node). Gemini steps: use_google_search, use_thinking (boolean), thinking_budget (number)"
          timeout_ms:
            type: integer
            default: 120000
        required:
          - key
          - name
    inputs:
      type: array
      items:
        type: object
        properties:
          input_type:
            type: string
          required:
            type: boolean
            default: true
          description:
            type: string
          example:
            type: string
            description: Example content showing what a well-formed input looks like
        required:
          - input_type
  required:
    - key
    - name
    - steps

UpdateJobDefinitionBody:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    steps:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          key:
            type: string
          name:
            type: string
          step_type:
            type: string
            enum: [prompt, map_reduce, code]
          assistant_handle:
            type: string
            nullable: true
          prompt_handle:
            type: string
            nullable: true
          input_source:
            type: string
            enum: [job_input, previous_step, template]
          input_config:
            type: object
          config:
            type: object
            description: "Step-type-specific config. map_reduce: chunk_size, threshold, batch_prompt_handle, skip_synthesis. code: script_path (.ts/.tsx via tsx, .py via python3, others via node). Gemini steps: use_google_search, use_thinking (boolean), thinking_budget (number)"
          timeout_ms:
            type: integer
        required:
          - key
          - name
    inputs:
      type: array
      items:
        type: object
        properties:
          input_type:
            type: string
          required:
            type: boolean
          description:
            type: string
          example:
            type: string
            description: Example content showing what a well-formed input looks like
        required:
          - input_type

KdagBackend:
  type: object
  description: Backend availability and model suggestions for kdag job execution
  properties:
    key:
      type: string
      description: Backend identifier (e.g., claude-code, codex-cli, gemini)
    name:
      type: string
      description: Human-readable backend name
    available:
      type: boolean
      description: Whether the backend CLI/API is available on this machine
    reason:
      type: string
      description: Why the backend is unavailable (only present when available=false)
    models:
      type: array
      description: Suggested model identifiers for this backend
      items:
        type: string
  required:
    - key
    - name
    - available
    - models

KdagInputType:
  type: object
  description: A registered input type for kdag pipeline definitions
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      description: Unique input type key (e.g., prompt, transcript, research_sources)
    description:
      type: string
      nullable: true
      description: Human-readable description of the input type
    format:
      type: string
      nullable: true
      description: "Content format hint: text, json, csv, markdown, url-list, code, xml"
  required:
    - id
    - key

CreateKdagInputTypeBody:
  type: object
  description: Body for registering a custom input type
  properties:
    key:
      type: string
      description: Unique key (lowercase letters, digits, hyphens, underscores; must start with a letter)
    description:
      type: string
      description: Human-readable description
    format:
      type: string
      description: "Content format hint: text, json, csv, markdown, url-list, code, xml"
  required:
    - key

# ── Kdag Jobs ─────────────────────────────────────────────

CreateKdagJobBody:
  type: object
  description: Create a kdag job for a pipeline definition
  properties:
    definition_key:
      type: string
      description: Pipeline definition key (e.g., 'session-summary', 'custom', 'chained-refinement')
    job_type:
      type: string
      description: "Legacy job type key (auto-resolved: session_summary, custom). Prefer definition_key."
    assistant_handle:
      type: string
      description: "Agent to execute the job (default: claude-code). Options: claude-code, gemini, codex-cli"
    session_id:
      type: string
      description: Session UUID (required for session_summary jobs)
    prompt_text:
      type: string
      description: Prompt text (required for custom jobs, optional override for session_summary)
    system_prompt_text:
      type: string
      description: System prompt override (optional)
    model:
      type: string
      description: Model override for execution
    mode:
      type: string
      enum: [full, incremental]
      description: "Session summary mode: full (default) or incremental (requires existing summary)"
    inputs:
      type: object
      additionalProperties:
        type: string
      description: "Input values keyed by input type (e.g., { prompt: '...', transcript: '...' }). Used with definition_key."

RunKdagJobBody:
  type: object
  description: Optional overrides when starting a job run
  properties:
    model:
      type: string
      description: Model override for this run
    assistant_handle:
      type: string
      description: Switch the job's assistant before running
    step_timeout_ms:
      type: integer
      description: "Override per-step timeout for all steps in this run (ms). Default: 120000"
    cli_flags:
      type: object
      description: Additional CLI flags passed to the backend
    queue:
      type: boolean
      description: "If true (default), queue the job when another is running. If false, return 409."
      default: true

RetryKdagJobBody:
  type: object
  description: Optional overrides when retrying a failed job
  properties:
    model:
      type: string
      description: Model override for the retry
    assistant_handle:
      type: string
      description: Switch the job's assistant before retrying
    step_timeout_ms:
      type: integer
      description: "Override per-step timeout for all steps in this retry (ms). Default: 120000"
    queue:
      type: boolean
      description: "If true (default), queue the retry when another job is running. If false, return 409."
      default: true

KdagQueueState:
  type: object
  description: Current job queue state
  properties:
    running:
      type: string
      format: uuid
      nullable: true
      description: Currently running job ID, or null
    queue:
      type: array
      items:
        type: object
        properties:
          job_id:
            type: string
            format: uuid
          run_id:
            type: string
            format: uuid
          position:
            type: integer
            description: Queue position (1-based)
        required:
          - job_id
          - run_id
          - position
  required:
    - running
    - queue

KdagJobSummary:
  type: object
  description: Job summary with latest run status
  properties:
    id:
      type: string
      format: uuid
    job_type:
      type: string
    definition_key:
      type: string
      nullable: true
    definition_name:
      type: string
      nullable: true
    requested_by:
      type: string
      nullable: true
    assistant_handle:
      type: string
    project_handle:
      type: string
      nullable: true
    project_name:
      type: string
      nullable: true
    latest_run:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        model:
          type: string
          nullable: true
        exit_code:
          type: integer
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        step_count:
          type: integer
        steps_completed:
          type: integer
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
    created_at:
      type: string
      format: date-time
  required:
    - id
    - job_type
    - assistant_handle
    - created_at

KdagJobList:
  type: object
  properties:
    jobs:
      type: array
      items:
        $ref: '#/KdagJobSummary'
    pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - total
        - limit
        - offset
  required:
    - jobs
    - pagination

KdagJobInput:
  type: object
  description: Job input (content omitted by default for large inputs)
  properties:
    id:
      type: string
      format: uuid
    input_type:
      type: string
    content_length:
      type: integer
    content:
      type: string
      description: Input content (only included with include_content=true; transcript never included)
    ref_type:
      type: string
      nullable: true
    ref_id:
      type: string
      nullable: true
  required:
    - id
    - input_type
    - content_length

KdagJobRun:
  type: object
  description: A single execution run of a job
  properties:
    id:
      type: string
      format: uuid
    status:
      type: string
      enum: [pending, running, completed, failed]
    model:
      type: string
      nullable: true
    exit_code:
      type: integer
      nullable: true
    error:
      type: string
      nullable: true
    duration_ms:
      type: integer
      nullable: true
    step_count:
      type: integer
    steps_completed:
      type: integer
    steps:
      type: array
      items:
        $ref: '#/KdagJobStep'
    output:
      type: string
      nullable: true
      description: Final output text (only for completed runs)
    started_at:
      type: string
      format: date-time
      nullable: true
    completed_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
  required:
    - id
    - status
    - step_count
    - steps_completed
    - steps
    - created_at

KdagJobStep:
  type: object
  description: Individual step execution record
  properties:
    id:
      type: string
      format: uuid
    definition_step_index:
      type: integer
      description: Which definition step this belongs to
    step_index:
      type: integer
      description: Local index within the definition step (0 for single steps, 0-N for map_reduce batches)
    step_type:
      type: string
      description: Step key from the definition
    status:
      type: string
      enum: [pending, running, completed, failed, canceled]
    input_chars:
      type: integer
      nullable: true
    input_text:
      type: string
      description: Full input text (only with include_content=true)
    duration_ms:
      type: integer
      nullable: true
    output_preview:
      type: string
      nullable: true
      description: First 500 chars of output (default mode)
    output_length:
      type: integer
      nullable: true
    metadata:
      type: object
      nullable: true
    created_at:
      type: string
      format: date-time
  required:
    - id
    - definition_step_index
    - step_index
    - step_type
    - status
    - created_at

KdagJobDetail:
  type: object
  description: Full job detail with inputs, runs, steps, and output
  properties:
    job:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_type:
          type: string
        definition_key:
          type: string
          nullable: true
        definition_name:
          type: string
          nullable: true
        requested_by:
          type: string
          nullable: true
        assistant_handle:
          type: string
        project_handle:
          type: string
          nullable: true
        project_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - job_type
        - assistant_handle
        - created_at
    inputs:
      type: array
      items:
        $ref: '#/KdagJobInput'
    runs:
      type: array
      items:
        $ref: '#/KdagJobRun'
    output:
      type: string
      nullable: true
      description: Output from the latest completed run (top-level convenience field)
  required:
    - job
    - inputs
    - runs

# ── Assistant Chat ────────────────────────────────────────

AssistantChatTurn:
  type: object
  description: A single conversation turn (user or assistant message)
  properties:
    role:
      type: string
      enum: [user, assistant]
    content:
      type: string
      maxLength: 100000
  required:
    - role
    - content

AssistantChatMessage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    chat_id:
      type: string
      format: uuid
    prompt_text:
      type: string
    response:
      type: string
      nullable: true
    model:
      type: string
    input_tokens:
      type: integer
      nullable: true
    output_tokens:
      type: integer
      nullable: true
    error:
      type: string
      nullable: true
    status:
      type: string
      enum: [pending, completed, failed]
      description: Turn lifecycle status
    grounding:
      type: object
      nullable: true
      description: Google Search grounding metadata (Gemini only)
      properties:
        searchQueries:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: object
            properties:
              uri:
                type: string
              title:
                type: string
    thinking:
      type: object
      nullable: true
      description: Thinking metadata (Gemini only)
      properties:
        text:
          type: string
        tokenCount:
          type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - chat_id
    - prompt_text
    - status
    - created_at
    - updated_at

AssistantChat:
  type: object
  properties:
    id:
      type: string
      format: uuid
    assistant_handle:
      type: string
    title:
      type: string
      nullable: true
    project_id:
      type: string
      format: uuid
      nullable: true
    project_handle:
      type: string
      nullable: true
    project_name:
      type: string
      nullable: true
    source:
      type: string
      description: Origin channel (ui, mcp, api)
    caller_handle:
      type: string
      nullable: true
      description: Handle of the assistant that initiated an MCP chat (e.g., claude-code, codex-cli)
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    messages:
      type: array
      description: Included when ?include_messages=true
      items:
        $ref: '#/AssistantChatMessage'
    delegations:
      type: object
      description: >
        Delegated child chats grouped by parent turn ID. Included when ?include_messages=true.
        Keys are parent turn UUIDs, values are arrays of ChatDelegation objects.
      additionalProperties:
        type: array
        items:
          $ref: '#/ChatDelegation'
  required:
    - id
    - assistant_handle
    - created_at
    - updated_at

ChatDelegation:
  type: object
  description: A delegated child chat linked to a specific parent turn
  properties:
    chat:
      $ref: '#/AssistantChat'
    messages:
      type: array
      items:
        $ref: '#/AssistantChatMessage'
    delegated_handle:
      type: string
      description: Backend handle that was delegated to (e.g., 'gemini')
  required:
    - chat
    - messages
    - delegated_handle

AssistantChatSummary:
  type: object
  properties:
    id:
      type: string
      format: uuid
    assistant_handle:
      type: string
    title:
      type: string
      nullable: true
    project_id:
      type: string
      format: uuid
      nullable: true
    project_handle:
      type: string
      nullable: true
    project_name:
      type: string
      nullable: true
    source:
      type: string
      description: Origin channel (ui, mcp, api)
    caller_handle:
      type: string
      nullable: true
      description: Handle of the assistant that initiated an MCP chat
    message_count:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - assistant_handle
    - message_count
    - created_at
    - updated_at

BackupFile:
  type: object
  description: A database backup file
  properties:
    filename:
      type: string
      description: Backup filename (e.g., khef_20260215_120000.sql.gz)
    size:
      type: integer
      description: File size in bytes
    size_human:
      type: string
      description: Human-readable file size (e.g., 1.2 MB)
    created_at:
      type: string
      format: date-time
      description: File modification timestamp
    path:
      type: string
      description: Absolute file path
  required:
    - filename
    - size
    - size_human
    - created_at
    - path

RestoreResponse:
  type: object
  description: Result of a database restore operation
  properties:
    success:
      type: boolean
    restored_from:
      type: string
      description: Filename that was restored
    safety_backup:
      type: string
      nullable: true
      description: Filename of the safety backup created before restore
    message:
      type: string
      description: Human-readable summary of the restore operation
  required:
    - success
    - restored_from
    - safety_backup
    - message

# ── Slack ────────────────────────────────────────────────

SlackIngestBody:
  type: object
  description: Request body for ingesting Slack markdown content
  properties:
    content:
      type: string
      description: Markdown content to ingest (### heading per message)
    document_id:
      type: string
      description: Stable identifier for deduplication and deletion (e.g., 'general-2024-05')
    metadata:
      type: object
      properties:
        channel:
          type: string
          description: Slack channel name
        workspace:
          type: string
          description: Slack workspace name
        team:
          type: string
          description: Team or group name
        topic:
          type: string
          description: Topic or thread subject
        date_range:
          type: string
          description: Date range covered
  required:
    - content
    - document_id

SlackIngestResult:
  type: object
  description: Result of a Slack content ingestion
  properties:
    document_id:
      type: string
    chunks_created:
      type: integer
      description: Number of chunks created (0 if content was unchanged)
    collection:
      type: string
      description: Collection name (slack-messages)
  required:
    - document_id
    - chunks_created
    - collection

SlackSearchResult:
  type: object
  description: A matching Slack message chunk from semantic search
  properties:
    content:
      type: string
      description: Matched message chunk content
    score:
      type: number
      format: float
      description: Cosine similarity score (0-1)
    document_id:
      type: string
      description: Source document identifier
    chunk_index:
      type: integer
      description: Chunk index within the document
    metadata:
      type: object
      nullable: true
      description: Chunk and document metadata
  required:
    - content
    - score
    - document_id
    - chunk_index

SlackDocument:
  type: object
  description: An ingested Slack document in the collection
  properties:
    id:
      type: string
      format: uuid
    document_id:
      type: string
      description: Document identifier (file_path in tracked_files)
    content_hash:
      type: string
    file_size:
      type: integer
    language:
      type: string
      nullable: true
    status:
      type: string
    metadata:
      type: object
      nullable: true
    chunk_count:
      type: integer
    uploaded_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - document_id
    - status
    - chunk_count
