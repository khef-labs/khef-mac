SourceCodeResult:
  type: object
  properties:
    file_path:
      type: string
      description: Relative file path within the repository
    content:
      type: string
      description: Matched code chunk content
    score:
      type: number
      format: float
      description: Cosine similarity score (0-1)
    language:
      type: string
      nullable: true
      description: Detected programming language
    chunk_index:
      type: integer
      description: Index of the chunk within the file
    metadata:
      type: object
      nullable: true
      description: Additional chunk metadata (repo/branch/commit identifiers when available)
      properties:
        repoName:
          type: string
          description: Repository name (UI-friendly key)
        repo:
          type: string
          description: Repository name (legacy/alternate key)
        branch:
          type: string
          description: Git branch name for the indexed snapshot
        commitHash:
          type: string
          description: Full commit hash for the indexed snapshot (UI-friendly key)
        commit:
          type: string
          description: Full commit hash (legacy/alternate key)
    context_before:
      type: array
      description: Neighboring chunks before the matched chunk (present when context > 0)
      items:
        type: object
        properties:
          chunk_index:
            type: integer
          content:
            type: string
    context_after:
      type: array
      description: Neighboring chunks after the matched chunk (present when context > 0)
      items:
        type: object
        properties:
          chunk_index:
            type: integer
          content:
            type: string
  required:
    - file_path
    - content
    - score
    - chunk_index

SourceCodeFacetsResponse:
  type: object
  properties:
    repos:
      type: array
      description: Distinct indexed repository names in the kvec-source collection
      items:
        type: string
    languages:
      type: array
      description: Distinct indexed languages (optionally filtered by repo)
      items:
        type: string
    branches:
      type: array
      description: Distinct indexed branches (optionally filtered by repo)
      items:
        type: string
  required:
    - repos
    - languages
    - branches

CommitSearchResult:
  type: object
  properties:
    sha:
      type: string
      description: Full commit SHA hash
    short_sha:
      type: string
      description: Short commit SHA hash
    message:
      type: string
      description: Commit subject line
    author:
      type: string
      description: Commit author name
    date:
      type: string
      description: Commit date (ISO 8601)
    repo:
      type: string
      description: Repository name
    score:
      type: number
      format: float
      description: Cosine similarity score (0-1)
    content:
      type: string
      description: Full embedded commit text
  required:
    - sha
    - short_sha
    - message
    - author
    - date
    - score

ActiveSession:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Cache row UUID
    session_id:
      type: string
      format: uuid
      description: Session file UUID (= task directory name)
    assistant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        handle:
          type: string
          example: claude-code
        name:
          type: string
          example: Claude Code
    project:
      nullable: true
      type: object
      properties:
        id:
          type: string
          format: uuid
        handle:
          type: string
        name:
          type: string
    file_path:
      type: string
      description: Absolute path to the .jsonl session file
    project_dir:
      type: string
      nullable: true
      description: Encoded project directory name under ~/.claude/projects/
    pid:
      type: integer
      nullable: true
      description: Claude Code process PID (from heartbeat hook or fuser detection)
    status:
      type: string
      enum:
        - active
        - inactive
    last_seen_at:
      type: string
      format: date-time
      nullable: true
    first_seen_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
      nullable: true
    updated_at:
      type: string
      format: date-time
      nullable: true
    transcript:
      nullable: true
      type: object
      description: Joined metadata from synced sessions table (null if not synced)
      properties:
        synced_session_id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        message_count:
          type: integer
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
GitCommit:
  type: object
  properties:
    sha:
      type: string
      description: Full commit SHA (40 chars)
    short_sha:
      type: string
      description: Short commit SHA (7 chars)
    message:
      type: string
      description: Commit message (first line)
    author:
      type: string
      description: Commit author name
    date:
      type: string
      format: date-time
      description: Commit date (ISO 8601)
  required:
    - sha
    - short_sha
    - message
    - author
    - date
DiffStats:
  type: object
  properties:
    files:
      type: integer
      description: Number of files changed
    insertions:
      type: integer
      description: Lines added
    deletions:
      type: integer
      description: Lines removed
  required:
    - files
    - insertions
    - deletions
DiffResult:
  type: object
  properties:
    diff:
      type: string
      description: Unified diff content
    stats:
      $ref: '#/DiffStats'
    refs:
      type: object
      properties:
        branch:
          type: string
        commit_sha:
          type: string
          nullable: true
        parent_sha:
          type: string
          nullable: true
  required:
    - diff
    - stats
    - refs
WorkingDiffResult:
  type: object
  description: Working tree diff with staged, unstaged, and combined views
  properties:
    staged:
      type: object
      properties:
        diff:
          type: string
          description: Staged changes diff (index vs HEAD)
        stats:
          $ref: '#/DiffStats'
      required:
        - diff
        - stats
    unstaged:
      type: object
      properties:
        diff:
          type: string
          description: Unstaged changes diff (working tree vs index)
        stats:
          $ref: '#/DiffStats'
      required:
        - diff
        - stats
    combined:
      type: object
      properties:
        diff:
          type: string
          description: Combined diff (working tree vs HEAD)
        stats:
          $ref: '#/DiffStats'
      required:
        - diff
        - stats
    refs:
      type: object
      properties:
        branch:
          type: string
        commit_sha:
          type: string
          nullable: true
          description: Always null for working tree
        parent_sha:
          type: string
          description: HEAD commit SHA
      required:
        - branch
        - parent_sha
  required:
    - staged
    - unstaged
    - combined
    - refs
DiffRecord:
  type: object
  properties:
    id:
      type: string
      format: uuid
    project_id:
      type: string
      format: uuid
    branch:
      type: string
    commit_sha:
      type: string
      nullable: true
      description: Commit SHA (null for working tree)
    parent_sha:
      type: string
      nullable: true
    path:
      type: string
      nullable: true
      description: Optional path filter
    created_at:
      type: string
      format: date-time
  required:
    - id
    - project_id
    - branch
    - created_at
Project:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Project unique identifier
    name:
      type: string
      description: Project name (internal identifier)
    handle:
      type: string
      pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
      description: Human-readable URL-safe handle (kebab-case, unique, immutable)
      example: khef
    display_name:
      type: string
      description: Display name for UI
      example: Khef
    description:
      type: string
      nullable: true
      description: Optional project description
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp
  required:
    - id
    - name
    - handle
    - display_name
    - created_at
    - updated_at
CreateProjectInput:
  type: object
  properties:
    name:
      type: string
      description: Project name (used to auto-generate handle if not provided)
      example: My Project
    handle:
      type: string
      pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
      description: Optional custom handle (kebab-case). If not provided, auto-generated from name.
      example: my-project
    display_name:
      type: string
      description: Optional display name. If not provided, defaults to name.
      example: My Awesome Project
    description:
      type: string
      description: Optional project description
  required:
    - name
UpdateProjectInput:
  type: object
  properties:
    name:
      type: string
      description: Project name (internal identifier)
    display_name:
      type: string
      description: Display name for UI
    description:
      type: string
      description: Optional project description
  description: Partial project update. Handle is immutable.
FullProjectInput:
  type: object
  properties:
    name:
      type: string
      description: Project name (internal identifier)
    display_name:
      type: string
      description: Display name for UI
    description:
      type: string
      description: Optional project description
  required:
    - name
  description: Full project replacement. Handle is immutable.
Memory:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Memory unique identifier
    project_id:
      type: string
      format: uuid
      description: Parent project ID
    handle:
      type: string
      pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
      description: Human-readable memory handle (kebab-case, unique per project)
      example: mem-1
    title:
      type: string
      maxLength: 200
      description: Memory title
    content:
      type: string
      description: Memory content (auto-chunked if >2000 chars)
    memory_type_id:
      type: string
      format: uuid
      description: Memory type ID (foreign key to memory_types table)
    type:
      $ref: '#/MemoryType'
      description: Memory type name (populated via JOIN)
    parent_type:
      type: string
      nullable: true
      description: >-
        Parent type name for knowledge hierarchy (e.g., 'knowledge' for commands/context/pattern children). Null for
        root types.
    parent_type_id:
      type: string
      format: uuid
      nullable: true
      description: Parent type ID (foreign key to memory_types table). Null for root types.
    status_id:
      type: string
      format: uuid
      description: Status ID (foreign key to memory_type_statuses table)
    status:
      type: string
      description: Status value (populated via JOIN, e.g., 'in_progress', 'done', 'active')
    status_updated_at:
      type: string
      format: date-time
      description: When the status was last updated
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp
  required:
    - id
    - project_id
    - handle
    - title
    - content
    - memory_type_id
    - created_at
    - updated_at
CompactMutationMemory:
  type: object
  description: >-
    Minimal memory response returned by default from create/update/append mutations. Use `?compact=false` for full
    response.
  properties:
    id:
      type: string
      format: uuid
    handle:
      type: string
    status:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - handle
    - created_at
    - updated_at
MemoryWithProject:
  allOf:
    - $ref: '#/Memory'
    - type: object
      properties:
        project:
          type: object
          properties:
            id:
              type: string
              format: uuid
            handle:
              type: string
            name:
              type: string
          required:
            - id
            - handle
            - name
MemoryGlobalSingle:
  allOf:
    - $ref: '#/Memory'
    - type: object
      properties:
        project_handle:
          type: string
        project_name:
          type: string
CreateMemoryInput:
  type: object
  properties:
    handle:
      type: string
      pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
      description: Required memory handle (kebab-case, unique per project)
      example: mem-42
    title:
      type: string
      maxLength: 200
      description: Memory title (unique within project)
    content:
      type: string
      description: Memory content
    type:
      $ref: '#/MemoryType'
    tags:
      type: array
      items:
        type: string
      description: Optional tags for the memory
  required:
    - handle
    - title
    - content
    - type
UpdateMemoryInput:
  type: object
  properties:
    handle:
      type: string
      pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
      description: Updated handle (kebab-case, unique within project)
    title:
      type: string
      maxLength: 200
      description: Updated memory title (unique within project)
    content:
      type: string
      description: Updated memory content
    type:
      $ref: '#/MemoryType'
    parent_type:
      type: string
      description: Optional parent type name to disambiguate scoped subtypes (e.g., 'google-doc' with type 'design-doc')
    status:
      type: string
      description: Optional status value (must be valid for the memory type)
    tags:
      type: array
      items:
        type: string
      description: Replace all tags (pass empty array to remove all)
  description: Partial memory update. Use the status endpoints to manage status.
FullMemoryInput:
  type: object
  properties:
    title:
      type: string
      maxLength: 200
      description: Memory title (unique within project)
    content:
      type: string
      description: Memory content
    type:
      $ref: '#/MemoryType'
    parent_type:
      type: string
      description: Optional parent type name to disambiguate scoped subtypes (e.g., 'google-doc' with type 'design-doc')
    tags:
      type: array
      items:
        type: string
      description: Replace all tags (pass empty array to remove all)
  required:
    - title
    - content
    - type
  description: Full memory replacement. Use PATCH for partial updates.
MemoryType:
  type: string
  enum:
    - user-note
    - assistant-note
    - project-note
    - user-todo
    - assistant-todo
    - decision
    - command
    - context
    - api
    - pattern
    - reference
    - assistant-rule
    - diagram
    - csv
    - knowledge
    - commands
  description: >-
    Type of memory. 'knowledge' is a parent type with 'commands', 'context', and 'pattern' as children. Filtering by
    'knowledge' returns all knowledge-family memories. Custom types can also be created.
MemoryTypeDetail:
  type: object
  description: Full memory type details including statuses and metadata
  properties:
    id:
      type: string
      format: uuid
      description: Type UUID
    type:
      type: string
      description: Type name
      example: pr-review
    description:
      type: string
      description: Description of the type
    built_in:
      type: boolean
      description: Whether this is a built-in (protected) type
    memory_count:
      type: integer
      description: Number of memories using this type
    parent_type:
      type: string
      description: Parent type name (for hierarchical types)
    children:
      type: array
      items:
        type: string
      description: Child type names (for parent types)
    statuses:
      type: array
      items:
        type: object
        properties:
          value:
            type: string
            example: open
          display_name:
            type: string
            example: Open
          description:
            type: string
          sort_order:
            type: integer
          inherited:
            type: boolean
            description: Whether this status is inherited from parent type
MemoryRelation:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Relation unique identifier
    source_memory_id:
      type: string
      format: uuid
      description: Source memory ID
    target_memory_id:
      type: string
      format: uuid
      description: Target memory ID
    relation_type:
      $ref: '#/RelationType'
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
  required:
    - id
    - source_memory_id
    - target_memory_id
    - relation_type
    - created_at
CreateRelationInput:
  type: object
  properties:
    source_memory_id:
      type: string
      format: uuid
      description: Source memory ID
    target_memory_id:
      type: string
      format: uuid
      description: Target memory ID
    relation_type:
      $ref: '#/RelationType'
  required:
    - source_memory_id
    - target_memory_id
    - relation_type
RelationType:
  type: string
  enum:
    - relates_to
    - contradicts
    - supports
    - depends_on
    - follows_from
    - references
    - supersedes
    - implements
    - blocks
    - extends
    - duplicates
  description: Forward relation type between memories
ContextualRelationType:
  type: string
  description: Relation type that can be forward or inverse depending on context
  enum:
    - relates_to
    - contradicts
    - supports
    - depends_on
    - follows_from
    - references
    - supersedes
    - implements
    - blocks
    - extends
    - duplicates
    - is_supported_by
    - is_contradicted_by
    - is_depended_on_by
    - is_followed_by
    - is_referenced_by
    - is_superseded_by
    - is_implemented_by
    - is_blocked_by
    - is_extended_by
    - is_duplicated_by
RelationTypeInfo:
  type: object
  properties:
    value:
      $ref: '#/RelationType'
    forward_label:
      type: string
      description: Human-readable label for forward direction
    inverse_value:
      type: string
      description: Inverse relation type value
    inverse_label:
      type: string
      description: Human-readable label for inverse direction
  required:
    - value
    - forward_label
    - inverse_value
    - inverse_label
FlatRelation:
  type: object
  description: Relation with contextual type and related memory details
  properties:
    id:
      type: string
      format: uuid
    relation_type:
      $ref: '#/ContextualRelationType'
    relation_label:
      type: string
      description: Human-readable label for the relation direction
    created_at:
      type: string
      format: date-time
    related_memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        handle:
          type: string
        title:
          type: string
        type:
          $ref: '#/MemoryType'
        status:
          type: string
        project_id:
          type: string
          format: uuid
        project_handle:
          type: string
        project_name:
          type: string
        parent_type:
          type: string
          nullable: true
          description: Parent type if this memory belongs to a type hierarchy (e.g., "knowledge" for commands/context/pattern)
  required:
    - id
    - relation_type
    - relation_label
    - created_at
    - related_memory
Tag:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Tag unique identifier
    name:
      type: string
      description: Tag name
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
  required:
    - id
    - name
    - created_at
PaginationMetadata:
  type: object
  properties:
    total_count:
      type: integer
      description: Total number of items matching the query
      example: 42
    limit:
      type: integer
      description: Number of items per page
      example: 20
    offset:
      type: integer
      description: Number of items skipped
      example: 0
    has_more:
      type: boolean
      description: Whether there are more items beyond the current page
      example: true
  required:
    - total_count
    - limit
    - offset
    - has_more
SnapshotListItem:
  type: object
  description: Summary info for a snapshot in the list view
  properties:
    id:
      type: string
      format: uuid
    snapshot_number:
      type: integer
      description: Snapshot number (1-based, sequential)
    content_hash:
      type: string
      description: SHA-256 hash of content at snapshot time
    source:
      type: string
      nullable: true
      enum:
        - manual
        - external-sync
        - pre-sync
        - pre-restore
        - pre-update
      description: |
        How the snapshot was created.
        - `manual` — explicit save (e.g., PATCH `?snapshot=true` or save button)
        - `external-sync` — captured during sync from an external source (e.g., Google Doc)
        - `pre-sync` — auto-captured before an external sync overwrites local content
        - `pre-restore` — auto-captured before restoring a historical snapshot
        - `pre-update` — auto-captured before any content-changing API call
          (`update_memory`, `update_memory_from_file`, `update_memory_section`,
          `append_memory`). Skipped when only metadata changes or content is unchanged.
    created_at:
      type: string
      format: date-time
    is_current:
      type: boolean
      description: Whether this is the currently active snapshot
    has_comments:
      type: boolean
      description: Whether the snapshot has preserved comments
  required:
    - id
    - snapshot_number
    - content_hash
    - created_at
    - is_current
    - has_comments
SnapshotDetail:
  type: object
  description: Full snapshot content and comments
  properties:
    memory_id:
      type: string
      format: uuid
    snapshot_number:
      type: integer
    content:
      type: string
      description: Memory content at snapshot time
    content_hash:
      type: string
      description: SHA-256 hash of content (historical snapshots only)
    source:
      type: string
      nullable: true
      description: How snapshot was created
    created_at:
      type: string
      format: date-time
      description: When snapshot was created (historical only)
    is_current:
      type: boolean
      description: Whether viewing the current snapshot
    comments:
      type: array
      description: Comments preserved at snapshot time (or live comments for current)
      items:
        type: object
        properties:
          id:
            type: string
            format: uuid
          content:
            type: string
          anchor_text:
            type: string
            nullable: true
          anchor_prefix:
            type: string
            nullable: true
          anchor_suffix:
            type: string
            nullable: true
          status:
            type: string
          author:
            type: string
          parent_comment_id:
            type: string
            format: uuid
            nullable: true
          created_at:
            type: string
            format: date-time
  required:
    - memory_id
    - snapshot_number
    - content
    - is_current
    - comments
SnapshotDiffChange:
  type: object
  description: A single diff chunk (added, removed, unchanged, or skipped lines)
  properties:
    type:
      type: string
      enum: [add, remove, equal, skip]
      description: Change type. "skip" indicates omitted unchanged lines when context is applied.
    value:
      type: string
      description: The text content of this chunk (empty string for skip chunks)
    lines_skipped:
      type: integer
      description: Number of lines omitted (only present for skip chunks)
  required:
    - type
    - value
SnapshotDiffResponse:
  type: object
  description: Structured line-level diff between two snapshots
  properties:
    memory_id:
      type: string
      format: uuid
    from:
      type: object
      properties:
        snapshot_number:
          type: integer
        source:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - snapshot_number
        - created_at
    to:
      type: object
      properties:
        snapshot_number:
          type: integer
        source:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - snapshot_number
        - created_at
    changes:
      type: array
      items:
        $ref: '#/SnapshotDiffChange'
    stats:
      type: object
      properties:
        additions:
          type: integer
        deletions:
          type: integer
        unchanged:
          type: integer
      required:
        - additions
        - deletions
        - unchanged
    pagination:
      type: object
      description: Pagination metadata for the changes array
      properties:
        total_changes:
          type: integer
          description: Total number of change chunks in the full diff
        limit:
          type: integer
          description: Max chunks returned (0 means all)
        offset:
          type: integer
          description: Number of chunks skipped
        has_more:
          type: boolean
          description: Whether more chunks are available
      required:
        - total_changes
        - limit
        - offset
        - has_more
  required:
    - memory_id
    - from
    - to
    - changes
    - stats
    - pagination
