openapi: 3.0.3
info:
  title: khef API
  description: Project memory API with PostgreSQL backend for tracking development decisions, context, and knowledge
  version: 0.1.0
  contact:
    name: khef
servers:
  - url: http://localhost:3100
    description: Local development server
tags:
  - name: health
    description: Health check endpoints
  - name: projects
    description: Project management
  - name: memories
    description: Project-scoped memory operations
  - name: memory-types
    description: Memory type and status discovery
  - name: relations
    description: Memory relation graph management
  - name: tags
    description: Tag operations
  - name: assistants
    description: Coding assistant configuration management
  - name: configs
    description: Config content, sync, and project-scoped variants
  - name: knowledge
    description: Project operational knowledge (commands, context, patterns)
  - name: diagram
    description: Diagram rendering via Kroki
  - name: settings
    description: App-wide settings
  - name: files
    description: File upload and serving
  - name: rules
    description: Assistant rule syncing
  - name: comments
    description: Memory comment operations
  - name: snapshots
    description: Memory content snapshots (versioning)
  - name: metadata
    description: Memory metadata operations (per-memory settings like export theme)
  - name: sessions
    description: Assistant session file management (filesystem-based)
  - name: plans
    description: Assistant plan file management with versioning
  - name: assistant-memories
    description: Assistant per-project memory file management with snapshots
  - name: stats
    description: System-wide statistics and metadata
  - name: gemini
    description: Gemini AI conversation and generation endpoints
  - name: gcloud
    description: gcloud CLI account and health helpers
  - name: active-sessions
    description: Active session detection via PID liveness, fuser, and mtime heuristics
  - name: vector
    description: Semantic vector search (memories and source code)
  - name: synced-sessions
    description: Synced session management (PostgreSQL-backed, full-text search, summaries)
  - name: kvec
    description: Kvec vector collection browsing and management
  - name: assistant-chat
    description: Unified assistant chat with persistent conversations (Claude, Codex, Gemini)
  - name: job-definitions
    description: Pipeline definition management (multi-step job orchestration)
  - name: jobs
    description: Job execution, monitoring, and lifecycle management
  - name: slack
    description: Slack message ingestion and semantic search
  - name: backups
    description: Database backup file management
  - name: seed
    description: Database seeding (memory types, statuses, definitions, memories)
