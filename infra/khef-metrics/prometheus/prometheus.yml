global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-scrape
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Khef API (running on host, accessed via Docker bridge)
  - job_name: 'khef-api'
    static_configs:
      - targets: ['host.docker.internal:3201']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL via postgres_exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # Redis via redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
